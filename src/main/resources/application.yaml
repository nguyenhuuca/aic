logging:
    level:
      com:
        example: DEBUG


instability-calculator:
  # Quality gates for the CLI / CI mode (java -jar ... --scan=<path>). Each gate is independent.
  gate:
    max-package-distance:   # fail if any package's distance from the main sequence exceeds threshold
      enabled: true
      threshold: 0.7
    forbidden-zones:        # fail if any package falls in the Zone of Pain or Zone of Uselessness
      enabled: false
    max-average-distance:   # fail if the average distance across packages exceeds threshold
      enabled: false
      threshold: 0.5
    no-cycles:              # fail if any circular dependency between packages is detected
      enabled: false

  native-packages:
    disabled: true
    values:
      - java.
      - javax.
      - jakarta.
      - sun.
      - com.sun.
      - org.w3c.
      - org.xml.
      - org.omg.
      - org.ietf.
      - jdk.
      - org.apache.xerces.
      - org.relaxng.

  external-packages:
    disabled: true
    values:
      - org.springframework.
      - org.apache.
      - com.google.
      - org.junit.
      - org.mockito.
      - org.slf4j.
      - org.logback.
      - org.hibernate.
      - com.fasterxml.
      - org.assertj.
      - org.aspectj.
      - io.micrometer.
      - io.swagger.
      - io.jsonwebtoken.
      - org.json.

  basic-types:
    disabled: true
    values:
      - boolean
      - byte
      - char
      - short
      - int
      - long
      - float
      - double
      - void
      - java.lang.Boolean
      - java.lang.Byte
      - java.lang.Character
      - java.lang.Short
      - java.lang.Integer
      - java.lang.Long
      - java.lang.Float
      - java.lang.Double
      - java.lang.Void
      - java.lang.String
      - java.lang.Object
      - java.lang.Class
server:
  port: 8081
