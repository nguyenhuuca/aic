name: Release

# Manually triggered: builds the reactor, tags the commit, and publishes a GitHub Release
# with both runnable jars attached (CLI + web).
on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version, without the leading v (e.g. 1.0.0)'
        required: true

permissions:
  contents: write   # create the tag and the release

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0   # full history + tags so the changelog step can diff against the previous tag

      - name: Set up JDK 22
        uses: actions/setup-java@v4
        with:
          java-version: '22'
          distribution: 'temurin'
          cache: maven

      - name: Build with Maven
        run: mvn -B clean package --file pom.xml

      - name: Stage release jars
        run: |
          mkdir -p release
          cp core/target/aic-cli.jar "release/aic-cli-${{ github.event.inputs.version }}.jar"
          cp web/target/aic-web.jar "release/aic-web-${{ github.event.inputs.version }}.jar"

      - name: Create tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -a "v${{ github.event.inputs.version }}" -m "Release v${{ github.event.inputs.version }}"
          git push origin "v${{ github.event.inputs.version }}"

      # This repo is trunk-based (direct commits to main, no PRs), so GitHub's
      # generate_release_notes produces an empty list. Build the changelog from the
      # commit subjects since the previous tag instead.
      - name: Generate release notes
        run: |
          version="v${{ github.event.inputs.version }}"
          prev_tag="$(git describe --tags --abbrev=0 "${version}^" 2>/dev/null || true)"
          {
            echo "## What's Changed"
            echo
            if [ -n "$prev_tag" ]; then
              git log --no-merges --pretty='- %s' "${prev_tag}..${version}"
              echo
              echo "**Full Changelog**: https://github.com/${{ github.repository }}/compare/${prev_tag}...${version}"
            else
              git log --no-merges --pretty='- %s' "${version}"
            fi
          } > release/notes.md
          cat release/notes.md

      - name: Create GitHub Release with jars
        uses: softprops/action-gh-release@v2
        with:
          tag_name: "v${{ github.event.inputs.version }}"
          name: "v${{ github.event.inputs.version }}"
          body_path: release/notes.md
          files: |
            release/aic-cli-${{ github.event.inputs.version }}.jar
            release/aic-web-${{ github.event.inputs.version }}.jar
