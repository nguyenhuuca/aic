# Continuous integration: build and test the Maven reactor on every push/PR to main.

name: CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:

    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    - name: Set up JDK 22
      uses: actions/setup-java@v4
      with:
        java-version: '22'
        distribution: 'temurin'
        cache: maven
    - name: Build and test with Maven
      run: mvn -B verify --file pom.xml   # verify runs unit tests + *IT integration tests (failsafe)
