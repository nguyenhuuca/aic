site_name: Abstractness & Instability Calculator
site_description: Package abstractness/instability metrics, quality gates, cycle and architecture checks for Java/Spring Boot projects
site_author: nguyenhuuca
repo_url: https://github.com/nguyenhuuca/abstractness-instability-calculator
repo_name: nguyenhuuca/abstractness-instability-calculator
edit_uri: edit/main/docs/

theme:
  name: material
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - navigation.indexes
    - search.highlight
    - search.suggest
    - content.code.copy
    - content.action.edit
  palette:
    - scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode

plugins:
  - search

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.tabbed:
      alternate_style: true
  - tables
  - toc:
      permalink: true

extra_javascript:
  - https://unpkg.com/mermaid@11/dist/mermaid.min.js

nav:
  - Home: index.md
  - Getting Started: getting-started.md
  - Usage:
      - Understanding the Metrics: metrics.md
      - CLI & CI Gates: cli-and-ci.md
      - Architecture Checks: architecture-checks.md
      - JSON Export & API: json-export.md
  - Reference:
      - Project Structure: project-structure.md
      - Contributing: contributing.md
